<div class="alert-container" [ngClass]="type" role="alert" aria-live="polite">
    <div class="alert-content">
        <span class="material-icons alert-icon" aria-hidden="true">{{ icon }}</span>
        <span class="message">{{ message }}</span>
    </div>
    <button type="button" class="close-btn" (click)="onClose()" aria-label="Cerrar notificación">
        <span class="material-icons" aria-hidden="true">close</span>
    </button>
</div>
