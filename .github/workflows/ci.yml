name: Angular CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Unit Tests
      run: pnpm test:unit --watch=false --browsers=ChromeHeadless

    - name: Run Integration Tests
      run: pnpm test:integration --watch=false --browsers=ChromeHeadless

    - name: Build
      run: pnpm run build
